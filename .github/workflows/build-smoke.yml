name: Build Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  electron-entry-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm run build

      - name: Build Electron main process
        run: pnpm run build:electron

      - name: Verify packaged entrypoint exists
        run: test -f dist-electron/electron/main.js
